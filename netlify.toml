[[headers]]
  # CORS for all paths
  for = "/*"

  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Per-surah tafsir files are immutable once deployed — cache aggressively.
# Pattern matches /{edition}/{surah}.json paths only.
[[headers]]
  for = "/*/*.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Editions index updates when new tafsirs are added — short cache so
# additions propagate quickly. MUST be AFTER the /*/*.json rule because
# Netlify's glob treats `*` as "anything including empty", so /*/*.json
# also matches /editions.json; later rule wins for overlapping headers.
[[headers]]
  for = "/editions.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
