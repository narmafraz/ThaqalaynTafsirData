[[headers]]
  # CORS and caching for all paths
  for = "/*"

  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Edition index may update when new tafsirs are added — shorter cache
[[headers]]
  for = "/editions.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Per-surah tafsir files are immutable once deployed — cache aggressively
[[headers]]
  for = "/*/*.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
